version: "3.8"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7027:8080"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./guitar-shop
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api